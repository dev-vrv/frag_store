services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_PORT: "8000"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    expose:
      - "8000"
    volumes:
      - ./backend:/app/backend
      - media_data:/app/backend/media
      - ./scripts:/app/scripts:ro
    command: ["/app/scripts/run-django-debug.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: backend.settings
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    volumes:
      - ./backend:/app/backend
      - media_data:/app/backend/media
      - ./scripts:/app/scripts:ro
    command: ["/app/scripts/run-celery-worker-debug.sh"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: backend.settings
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    volumes:
      - ./backend:/app/backend
      - media_data:/app/backend/media
      - ./scripts:/app/scripts:ro
    command: ["/app/scripts/run-celery-beat-debug.sh"]
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      FRONTEND_PORT: "3000"
      API_URL: "http://backend:8000/api"
      NEXT_PUBLIC_API_URL: "http://localhost:${NGINX_PORT:-80}/api"
    expose:
      - "3000"
    volumes:
      - ./frontend:/app/frontend
      - ./scripts:/app/scripts:ro
      - frontend_node_modules:/app/frontend/node_modules
    command: ["/app/scripts/run-next-debug.sh"]
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
  frontend_node_modules:
